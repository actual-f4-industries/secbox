name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  build:
    name: Build & test (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Secbox.slnx

      - name: Build (Release)
        env:
          # Skip the post-build dev-drop copy (see Secbox.Core.csproj) — this is CI, not a dev machine.
          SECBOX_SKIP_DEVDROP: "1"
        run: dotnet build Secbox.slnx -c Release --no-restore

      - name: Test (managed only)
        run: |
          if (Test-Path tests) {
            dotnet test Secbox.slnx -c Release --no-build --logger "trx;LogFileName=test-results.trx"
          } else {
            Write-Host "No tests/ directory yet — skipping"
          }
